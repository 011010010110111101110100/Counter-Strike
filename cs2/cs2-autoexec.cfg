// CS2

unbindall

// MOVEMENT
// sj
bind "mwheeldown" "+jump"
bind "mwheelup" "+jump"

// jb
alias jbn "-duck; bind mouse_x jb1"
alias jb1 "+jump; bind mouse_x jb2"
alias jb2 "-jump; revert"
bind mouse4 jbn


//duck
bind "space" "+duck"

// VIEWMODEL
viewmodel_offset_x 2.5
viewmodel_offset_y 2
viewmodel_offset_z -2

// BINDS
bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "shift" "+sprint"
bind "ALT" noclip
//bind "w" +forward
//bind "s" +back
//bind "a" +left
//bind "d" +right

bind w +w
bind a +a
bind d +d
bind s +s
exec nulls
alias revert "bind mouse_x yaw"

// MOUSE
bind "mouse_x" "yaw"
bind "mouse_y" "pitch"

// INTERACT/SELECT
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "z" "slot11"
bind "6" "slot12"
bind "f" "+lookatweapon"
bind "y" "say"
bind "u" "say_team"
bind "b" "buymenu"
bind "t" +spray_menu
bind "m" "teammenu"
bind "tab" "+showscores"
bind "F3" "toggle cl_dm_buyrandomweapons"

// COMMUNICATION
bind "v" "+voicerecord"
bind "x" "player_ping"
bind "c" "radio"
bind mouse5 "cl_radial_radio_tab_0_text_1"

// SAY BINDS
bind "]" "say ill kill myself for a commend ☛☚"
bind "'" "say my boobs hurt when i run >.<"
bind "[" "say rich slime forever </3"
bind "/" "say you just got iptables -A INPUT -p tcp -j DROP'ed"

// ALIASES
alias dc "disconnect"
alias qt "quit"

// MISC
bind "-" "toggleconsole"
cl_crosshair_friendly_warning 0
r_show_build_info 0
//DEPRECATED cl_join_advertise 2

