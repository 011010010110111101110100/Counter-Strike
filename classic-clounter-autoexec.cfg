unbind all

// CROSSHAIR
cl_crosshairstyle "4"
cl_crosshairsize "2"
cl_crosshairgap "-5"
cl_crosshairthickness "0.5"
cl_crosshairdot "0"
cl_crosshair_outlinethickness "0"
cl_crosshair_drawoutline "0"
cl_crosshairalpha "255"
cl_crosshaircolor_b "255"
cl_crosshaircolor_r "255"
cl_crosshaircolor_g "255"

// VIEWMODEL
viewmodel_offset_x 2.5
viewmodel_offset_y 2
viewmodel_offset_z -2

// MOVEMENT
bind mwheeldown +jump
bind mwheelup +jump
bind space +duck

// MOUSE
sensitivity 0.80

// INTERACT/SELECT
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "z" "slot11"
bind "6" "slot12"
bind "f" "+lookatweapon"
bind "y" "say"
bind "u" "say_team"
bind "b" "buymenu"
bind "t" +spray_menu
bind "m" "teammenu"
bind "tab" "+showscores"
bind "F3" "toggle cl_dm_buyrandomweapons"
bind "mouse5" "lastinv"

// COMMUNICATION
bind "v" "+voicerecord"
bind "x" "player_ping"
bind "c" "radio"

// SAY BINDS
bind "]" "say :3 ill kill myself for a commend ☛☚"
bind "'" "say rich slime forever </3"
bind "/" "say redbull gives me wings"
bind "[" "say my boobs hurt when i run"

// ALIASES
alias dc "disconnect"
alias qt "quit"

// MISC
bind "-" "toggleconsole"
cl_join_advertise 2

